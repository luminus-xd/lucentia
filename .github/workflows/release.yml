name: 'アプリケーションビルド & リリース'

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'リリースタグ (例: v1.2.0)'
        required: true

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
      tag_name: ${{ steps.resolve-tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: タグ名の解決
        id: resolve-tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: タグ名の検証
        shell: bash
        run: |
          TAG="${{ steps.resolve-tag.outputs.tag }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "エラー: タグ名が不正です: $TAG"
            echo "semver形式 (例: v1.2.3) である必要があります"
            exit 1
          fi

      - name: リリース作成
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.resolve-tag.outputs.tag }}';
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Lucentia ${tag}`,
              draft: true,
              prerelease: false,
              generate_release_notes: true
            });
            console.log(`Release ID: ${data.id}`);
            return data.id;

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: ソースコードのチェックアウト
        uses: actions/checkout@v4

      - name: バージョン番号の更新
        shell: bash
        run: |
          TAG="${{ needs.create-release.outputs.tag_name }}"
          VERSION="${TAG#v}"
          echo "バージョン: $VERSION"

          # tauri.conf.jsonのバージョン番号を更新
          if command -v jq &> /dev/null; then
            jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            sed -i '' 's/"version": "[^"]*"/"version": "'"$VERSION"'"/' src-tauri/tauri.conf.json
          else
            sed -i 's/"version": "[^"]*"/"version": "'"$VERSION"'"/' src-tauri/tauri.conf.json
          fi
          cat src-tauri/tauri.conf.json

      - name: Node.jsセットアップ
        uses: actions/setup-node@v4
        with:
          node-version-file: 'package.json'
          cache: 'npm'

      - name: Rustセットアップ
        uses: dtolnay/rust-toolchain@stable

      - name: Rustキャッシュ
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: 依存関係インストール
        run: npm ci

      - name: Tauriビルド
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
